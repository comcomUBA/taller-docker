services:
  llama:
    build: ./llama
    ports:
      - "11434:11434"
    networks:
      - chat_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - OLLAMA_HOST=http://llama:11434
      - MODEL=${MODEL}
    depends_on:
      llama:
        condition: service_healthy
    networks:
      - chat_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - chat_network
    restart: unless-stopped

networks:
  chat_network:
    driver: bridge
