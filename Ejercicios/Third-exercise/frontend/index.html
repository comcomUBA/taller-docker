<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Chatbot Local</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    h1 {
      margin-bottom: 16px;
      font-size: 1.4rem;
      color: #a29bfe;
    }

    #chat {
      width: 100%;
      max-width: 720px;
      height: 80vh;
      display: flex;
      flex-direction: column;
      background: #16213e;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 16px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .user {
      align-self: flex-end;
      background: #6c63ff;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .assistant {
      align-self: flex-start;
      background: #0f3460;
      color: #ddd;
      border-bottom-left-radius: 4px;
    }

    .thinking {
      align-self: flex-start;
      color: #888;
      font-style: italic;
      font-size: 0.9rem;
    }

    #input-area {
      display: flex;
      padding: 16px;
      gap: 10px;
      border-top: 1px solid #0f3460;
    }

    #message-input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      background: #0f3460;
      color: white;
      font-size: 1rem;
      outline: none;
    }

    #message-input::placeholder { color: #555; }

    button {
      padding: 10px 20px;
      background: #6c63ff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
    }

    button:hover { background: #574fd6; }
    button:disabled { background: #333; cursor: default; }
  </style>
</head>
<body>
  <h1>Chatbot Local 🤖</h1>
  <div id="chat">
    <div id="messages"></div>
    <div id="input-area">
      <input
        type="text"
        id="message-input"
        placeholder="Escribí un mensaje..."
        onkeydown="if(event.key==='Enter') sendMessage()"
      >
      <button id="send-btn" onclick="sendMessage()">Enviar</button>
    </div>
  </div>

  <script>
    const history = [];
    const BACKEND = "http://localhost:5000";

    async function sendMessage() {
      const input = document.getElementById("message-input");
      const btn = document.getElementById("send-btn");
      const message = input.value.trim();
      if (!message) return;

      addMessage("user", message);
      history.push({ role: "user", content: message });
      input.value = "";

      const thinking = addMessage("thinking", "Pensando...");
      btn.disabled = true;
      input.disabled = true;

      try {
        const res = await fetch(`${BACKEND}/api/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message, history: history.slice(0, -1) })
        });

        const data = await res.json();
        thinking.remove();
        addMessage("assistant", data.response);
        history.push({ role: "assistant", content: data.response });
      } catch (e) {
        thinking.remove();
        addMessage("assistant", "Error al conectar con el backend.");
      }

      btn.disabled = false;
      input.disabled = false;
      input.focus();
    }

    function addMessage(role, content) {
      const messages = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = `message ${role}`;
      div.textContent = content;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }
  </script>
</body>
</html>
