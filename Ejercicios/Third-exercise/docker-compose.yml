services:
  llama:
    build: ./llama
    ports:
      - "11434:11434"
    networks:
      - chat_network

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - OLLAMA_HOST=http://llama:11434
      - MODEL=${MODEL}
    networks:
      - chat_network

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    networks:
      - chat_network

networks:
  chat_network:
    driver: bridge
