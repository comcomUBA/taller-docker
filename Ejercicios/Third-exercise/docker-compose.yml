services:
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - chat_network
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - MODEL=qwen2:0.5b
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - chat_network

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    networks:
      - chat_network

networks:
  chat_network:
    driver: bridge

volumes:
  ollama_data:
